/go2_teleop_node:
  ros__parameters:
    axis_linear:
      x: 1
      y: 3
    scale_linear:
      x: 0.5
      y: 0.5

    axis_angular:
      yaw: 6
    scale_angular:
      yaw: 1.0

    # Deadman: teleop only emits while the enable button is held, so the
    # priority-10 joy input does not permanently mask Nav2 (priority 5).
    # Holding the button with sticks centered = commanded stop = manual e-stop.
    # NOTE: verify enable_button for your controller via `ros2 topic echo /joy`.
    require_enable_button: true
    enable_button: 4
    enable_turbo_button: -1


/twist_mux:
  ros__parameters:
    topics:
      joy:
        topic   : cmd_vel_joy
        timeout : 0.5
        priority: 10
      navigation:
        topic   : cmd_vel
        timeout : 0.5
        priority: 5
