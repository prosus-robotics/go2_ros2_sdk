# robot_localization EKF (FIX-7) - opt-in via `ekf:=true`.
#
# Fuses the onboard pose estimate (odom topic, sourced from
# rt/utlidar/robot_pose) with the IMU (imu/data) and publishes a smoothed
# odom->base_link transform. Enable with:
#   ros2 launch go2_robot_sdk robot.launch.py ekf:=true
# When enabled, the driver stops broadcasting its own odom->base_link so there
# is a single TF authority. Left disabled by default; turn on only if pose
# jumps persist after the other stability fixes.
ekf_filter_node:
  ros__parameters:
    use_sim_time: false
    frequency: 30.0
    sensor_timeout: 0.1
    two_d_mode: true
    publish_tf: true
    publish_acceleration: false

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # Absolute x, y, yaw from the onboard pose estimate.
    # Order: x, y, z, roll, pitch, yaw, vx, vy, vz, vroll, vpitch, vyaw, ax, ay, az
    odom0: odom
    odom0_config: [true,  true,  false,
                   false, false, true,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 10

    # Yaw rate from the IMU to smooth heading between pose updates.
    imu0: imu/data
    imu0_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, true,
                  false, false, false]
    imu0_differential: false
    imu0_relative: false
    imu0_queue_size: 10
    imu0_remove_gravitational_acceleration: true
